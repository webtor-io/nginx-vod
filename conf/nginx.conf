worker_processes  auto;

events {
	worker_connections 16384;
}

http {
	log_format  main  '$remote_addr $remote_user [$time_local] "$request" '
		'$status "$http_referer" "$http_user_agent"';

	access_log  /dev/stdout  main;
	error_log   stderr warn;

	default_type  application/octet-stream;
	include       /usr/local/nginx/conf/mime.types;

	sendfile    on;
	tcp_nopush  on;
	tcp_nodelay on;

	vod_mode                           remote;
	vod_upstream_location              /remote;
	vod_metadata_cache                 metadata_cache 1024m;
	vod_response_cache                 response_cache 512m;
	vod_base_url                       '';

	vod_last_modified_types            *;
	# vod_segment_duration               9000;
	# vod_align_segments_to_key_frames   on;
	vod_dash_fragment_file_name_prefix "s";
	vod_hls_segment_file_name_prefix   "s";

	vod_manifest_segment_durations_mode accurate;

	secure_token_avoid_cookies on;
	secure_token_types application/vnd.apple.mpegurl application/dash+xml text/xml;
	secure_token $token;

	vod_upstream_extra_args $token;

	proxy_http_version 1.1;
	proxy_set_header   Connection "";

	proxy_connect_timeout 10s;
	proxy_send_timeout    60s;
	proxy_read_timeout    120s;

	proxy_buffer_size        16k;
	proxy_buffers            64 64k;
	proxy_busy_buffers_size  256k;
	proxy_max_temp_file_size 0;

	gzip             on;
	gzip_types       application/vnd.apple.mpegurl application/dash+xml text/xml text/vtt;
	gzip_proxied     any;
	gzip_min_length  1024;

	keepalive_timeout  60;
	keepalive_requests 1000;

	upstream remote {
		server torrent-http-proxy;
		keepalive          64;
		keepalive_requests 1000;
	}

	map $http_x_tokenize $token {
       "no" "";
       default $args;
	}

	server {
        listen 80;
        server_name localhost;
		root /opt/static;

		location = / {
			access_log off;
			return 200 "ok\n";
		}

		location /health {
			access_log off;
			return 200 "healthy\n";
		}

		location ~ /remote/[^/]+/(.*) {
			internal;
			proxy_pass http://remote$http_x_full_path$is_args$args;
		}

		location /hls/ {
			vod hls;

			vod_bootstrap_segment_durations 2000;
			vod_bootstrap_segment_durations 2000;
			vod_bootstrap_segment_durations 2000;
			vod_bootstrap_segment_durations 4000;
			vod_bootstrap_segment_durations 4000;
			vod_bootstrap_segment_durations 6000;

			add_header Access-Control-Allow-Headers '*';
			add_header Access-Control-Allow-Origin '*';
			add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
		}
	}
}
